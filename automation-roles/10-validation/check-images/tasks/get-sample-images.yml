---
# Dynamically fetch images using cpd-cli list-images command
# cpd-cli is installed by the deployer in earlier phases

- name: Initialize images list
  set_fact:
    _images_to_validate: []

- name: Debug - Show all_config.cp4d
  debug:
    msg: "CP4D config: {{ all_config.cp4d | default('NOT DEFINED') }}"

- name: Debug - Show CP4D requested status
  debug:
    msg: "CP4D requested: {{ _cp4d_requested | default('NOT SET') }}"

# CP4D Image Fetching using cpd-cli
- block:
  - name: Get CP4D version from configuration
    set_fact:
      _cp4d_version: "{{ all_config.cp4d[0].cp4d_version | default('5.0.0') }}"
    when: 
      - all_config.cp4d is defined
      - all_config.cp4d | length > 0

  - name: Get CP4D cartridges with state=installed only
    set_fact:
      _cp4d_cartridges: "{{ all_config.cp4d | map(attribute='cartridges') | flatten | selectattr('state', 'defined') | selectattr('state', 'equalto', 'installed') | map(attribute='name') | list }}"
    when: all_config.cp4d is defined

  - name: Build component list for cpd-cli (only valid cartridges, no cpfs/cpd_platform)
    set_fact:
      _cpd_components: "{{ _cp4d_cartridges | join(',') }}"

  - name: Debug - Show extracted cartridge names
    debug:
      msg: "Cartridge names extracted: {{ _cp4d_cartridges }}"

  - name: Display cpd-cli command that will be executed
    debug:
      msg: |
        Fetching images using: cpd-cli manage list-images
        Release: {{ _cp4d_version }}
        Components: {{ _cpd_components }}
        Sample size: {{ _check_images_sample_size | int }} images per component

  - name: Fetch images using cpd-cli list-images
    shell: |
      cpd-cli manage list-images \
        --release={{ _cp4d_version }} \
        --components={{ _cpd_components }} \
        --inspect_source_registry=true 2>&1
    register: _cpd_cli_result
    failed_when: false
    changed_when: false
    environment:
      IBM_ENTITLEMENT_KEY: "{{ ibm_cp_entitlement_key }}"

  - name: Check if CSV file exists
    stat:
      path: "{{ status_dir }}/cpd-cli-workspace/olm-utils-workspace/work/offline/{{ _cp4d_version }}/list_images.csv"
    register: _csv_file_stat

  - name: Debug - CSV file status
    debug:
      msg: |
        CSV file path: {{ status_dir }}/cpd-cli-workspace/olm-utils-workspace/work/offline/{{ _cp4d_version }}/list_images.csv
        File exists: {{ _csv_file_stat.stat.exists }}
        {% if _csv_file_stat.stat.exists %}
        File size: {{ _csv_file_stat.stat.size }} bytes
        {% endif %}

  - name: Read images from cpd-cli output CSV file
    shell: |
      CSV_FILE="{{ status_dir }}/cpd-cli-workspace/olm-utils-workspace/work/offline/{{ _cp4d_version }}/list_images.csv"
      if [ -f "$CSV_FILE" ]; then
        echo "Reading CSV file: $CSV_FILE" >&2
        cat "$CSV_FILE" | \
        grep -E "cp\.icr\.io|icr\.io" | \
        awk -F',' '{print $1}' | \
        sort -u{% if _check_images_sample_size != 'all' %} | \
        head -n {{ (_check_images_sample_size | int) * ((_cp4d_cartridges | default([]) | length) + 2) }}{% endif %}

      else
        echo "CSV file not found: $CSV_FILE" >&2
        exit 1
      fi
    register: _cpd_cli_images
    failed_when: _cpd_cli_images.rc != 0
    changed_when: false
    when: _csv_file_stat.stat.exists

  - name: Display CSV read result
    debug:
      msg: |
        CSV read exit code: {{ _cpd_cli_images.rc | default('N/A') }}
        Number of images found: {{ _cpd_cli_images.stdout_lines | default([]) | length }}
        {% if _cpd_cli_images.stdout_lines | default([]) | length > 0 %}
        First 3 images: {{ _cpd_cli_images.stdout_lines[:3] }}
        {% endif %}
        {% if _cpd_cli_images.rc != 0 %}
        Error output: {{ _cpd_cli_images.stderr | default('No stderr') }}
        {% endif %}

  - name: Check if cpd-cli returned images
    debug:
      msg: "cpd-cli returned {{ _cpd_cli_images.stdout_lines | length }} images"

  - name: Parse cpd-cli output into image list
    set_fact:
      _images_to_validate: >-
        {{ _cpd_cli_images.stdout_lines | 
           map('regex_replace', '^(.*)$', '{"component": "cpd_dynamic", "image": "\1"}') | 
           map('from_json') | 
           list }}
    when:
      - _cpd_cli_images.rc == 0
      - _cpd_cli_images.stdout_lines | length > 0

  when: _cp4d_requested | bool

# CP4I Image Fetching (placeholder for future cpd-cli support)
- block:
  - name: Add note about CP4I validation
    debug:
      msg: "CP4I validation with cpd-cli is not yet implemented"

  when: _cp4i_requested | bool

# CP4BA Image Fetching (placeholder for future cpd-cli support)
- block:
  - name: Add note about CP4BA validation
    debug:
      msg: "CP4BA validation with cpd-cli is not yet implemented"

  when: _cp4ba_requested | bool

# CP4WAIOps Image Fetching (placeholder for future cpd-cli support)
- block:
  - name: Add note about CP4WAIOps validation
    debug:
      msg: "CP4WAIOps validation with cpd-cli is not yet implemented"

  when: _cp4waiops_requested | bool

- name: Ensure at least one image is selected for validation
  fail:
    msg: |
      No images found for validation. This could be because:
      1. cpd-cli list-images command failed
      2. No Cloud Pak components are configured for deployment
      
      To skip validation, set: check_images.enabled: false
  when: _images_to_validate | length == 0

- name: Display selected images for validation
  debug:
    msg: "Selected {{ _images_to_validate | length }} images for validation using cpd-cli"


---
# Fetch images dynamically using cpd-cli manage list-images

- name: Initialize images list
  set_fact:
    _images_to_validate: []

# CP4D Image Fetching using cpd-cli to discover real images
- name: Write CP4D validation debug info to file
  copy:
    content: |
      CP4D Validation Status:
      - _cp4d_requested: {{ _cp4d_requested | default('UNDEFINED') }}
      - all_config.cp4d defined: {{ all_config.cp4d is defined }}
      - all_config.cp4d length: {{ (all_config.cp4d | default([])) | length }}
    dest: "{{ status_dir }}/log/check-images-debug.log"
  failed_when: false

- name: Debug CP4D requested status
  debug:
    msg: "_cp4d_requested = {{ _cp4d_requested | default('UNDEFINED') }}"

- block:
  - name: Get CP4D version from first instance
    set_fact:
      _cp4d_version: "{{ all_config.cp4d[0].cp4d_version | default('5.0.0') }}"
    when: all_config.cp4d is defined and all_config.cp4d | length > 0

  - name: Set deployer directory for cp4d-switch-olm-utils role
    set_fact:
      _deployer_dir: "{{ playbook_dir | dirname }}"

  - name: Switch to the correct olm-utils version to access CASE files
    include_role:
      name: cp4d-switch-olm-utils
    vars:
      _p_cp4d_version: "{{ _cp4d_version }}"

  - name: Include CP4D installation variables for cartridge mapping
    include_vars: "{{ playbook_dir | dirname }}/automation-roles/50-install-cloud-pak/cp4d/cp4d-variables/vars/vars-cp4d-installation.yml"

  - name: Get CP4D cartridges with state=installed only
    set_fact:
      _cp4d_cartridges: "{{ all_config.cp4d | map(attribute='cartridges') | flatten | selectattr('state', 'defined') | selectattr('state', 'equalto', 'installed') | map(attribute='name') | list }}"
    when: all_config.cp4d is defined

  - name: Map cartridge names to olm_utils names
    set_fact:
      _cp4d_olm_cartridges: "{{ _cp4d_olm_cartridges | default([]) + [item.olm_utils_name] }}"
    loop: "{{ cartridge_cr }}"
    when:
      - _cp4d_cartridges is defined
      - item.name in _cp4d_cartridges
      - item.olm_utils_name is defined
      - not (item.cr_internal | default(False))

  - name: Build component list for cpd-cli (only valid olm_utils components)
    set_fact:
      _cpd_components: "cpfs,cpd_platform,{{ _cp4d_olm_cartridges | join(',') }}"
    when: _cp4d_olm_cartridges is defined and _cp4d_olm_cartridges | length > 0

  - name: Find CASE image CSV files for installed cartridges
    find:
      paths: "{{ _deployer_dir }}/cpd-cli-workspace/olm-utils-workspace/work/offline/{{ _cp4d_version }}/.ibm-pak/data/cases"
      patterns: "*-images.csv"
      recurse: yes
    register: _case_image_files
    failed_when: false

  - name: Extract entitled images from CASE CSV files (cp.icr.io only)
    shell: |
      if [ {{ _case_image_files.matched | default(0) }} -gt 0 ]; then
        for csv_file in {{ _case_image_files.files | map(attribute='path') | join(' ') }}; do
          tail -n +2 "$csv_file" | awk -F',' '{print $1 "/" $2 ":" $3}' | grep "^cp\.icr\.io"
        done | sort -u | head -n {{ _check_images_sample_size | default(3) | int * (_cp4d_cartridges | default([]) | length) }}
      fi
    register: _case_images
    failed_when: false
    changed_when: false
    when:
      - _case_image_files is defined
      - _case_image_files.matched | default(0) > 0

  - name: Parse CASE output into image list
    set_fact:
      _images_to_validate: >-
        {{ _images_to_validate + [
          {
            'component': item.split('/')[3].split(':')[0] if ':' in item else item.split('/')[3].split('@')[0],
            'image': item
          }
        ] }}
    loop: "{{ _case_images.stdout_lines | default([]) }}"
    when:
      - _case_images is defined
      - _case_images.rc == 0
      - _case_images.stdout_lines is defined

  when: _cp4d_requested | bool

# CP4I Image Fetching (placeholder for future cpd-cli support)
- block:
  - name: Add note about CP4I validation
    debug:
      msg: "CP4I validation with cpd-cli is not yet implemented"

  when: _cp4i_requested | bool

# CP4BA Image Fetching (placeholder for future cpd-cli support)
- block:
  - name: Add note about CP4BA validation
    debug:
      msg: "CP4BA validation with cpd-cli is not yet implemented"

  when: _cp4ba_requested | bool

# CP4WAIOps Image Fetching (placeholder for future cpd-cli support)
- block:
  - name: Add note about CP4WAIOps validation
    debug:
      msg: "CP4WAIOps validation with cpd-cli is not yet implemented"

  when: _cp4waiops_requested | bool

- name: Check if cpd-cli was available
  set_fact:
    _cpd_cli_available: "{{ _cpd_cli_check is defined and _cpd_cli_check.rc == 0 }}"

- name: Debug images to validate
  debug:
    msg: "Images to validate: {{ _images_to_validate | length }} images found (cpd-cli available: {{ _cpd_cli_available }})"

- name: Warn if cpd-cli is not available and skip validation
  debug:
    msg: |
      WARNING: cpd-cli is not available - image validation will be skipped.
      
      To enable validation, install cpd-cli from:
      https://www.ibm.com/docs/en/software-hub/5.1.x?topic=manage-list-images
      
      Alternatively, disable this check by setting:
      check_images:
        enabled: false
  when: not (_cpd_cli_available | bool)

- name: Ensure at least one image is selected for validation when cpd-cli is available
  fail:
    msg: |
      No images found for validation. This could be because:
      1. cpd-cli failed to retrieve images (check network connectivity or cpd-cli output)
      2. The entitlement key does not have access to the required registries
      3. No Cloud Pak components are configured for deployment
      4. cpd-cli command failed - check the output above for errors
      
      To skip validation, set: check_images.enabled: false
  when:
    - _cpd_cli_available | bool
    - _images_to_validate | length == 0

- name: Display selected images for validation
  debug:
    msg: "Selected {{ _images_to_validate | length }} images for validation using cpd-cli"
  when: _images_to_validate | length > 0


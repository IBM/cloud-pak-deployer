- name: Validate mandatory variables are defined for Hashicorp Vault
  assert:
    that:
      - vault.vault_secret_path is defined
      - vault.vault_secret_field is defined
      - secret_name is defined
      - secret_group is defined

- set_fact:
    _secret_field: "{{ vault.vault_secret_field }}"

- set_fact:
    _secret_field: "{{ secret_name.split(',')[1] }}"
  when: secret_name is search(",")

- set_fact:
    _secret_name: "{{ secret_name.split(',')[0] }}"

- set_fact:
    _hashicorp_secret_name_path: "{{ _secret_name }}"
  when: _secret_name is search("/")

- set_fact:
    _hashicorp_secret_name_path: "{{ secret_group}}/{{ _secret_name }}"
  when: 
  - (vault.vault_secret_path_append_group | default(True) | bool)
  - not _secret_name is search("/")

- set_fact:
    _hashicorp_secret_name_path: "{{ _secret_name }}"
  when: 
  - not (vault.vault_secret_path_append_group | default(True) | bool)
  - not _secret_name is search("/")

- include_tasks: get-secret-hashicorp-token.yml
  vars:
    hashicorp_vault_address: "{{ VAULT_URL | default(vault.vault_url) }}"
    hashicorp_secret_name_path: "{{ _hashicorp_secret_name_path }}"
  when: 
  - vault.vault_authentication_type == 'token'

- include_tasks: get-secret-hashicorp-certificate.yml
  vars:
    hashicorp_vault_address: "{{ VAULT_URL | default(vault.vault_url) }}"
    hashicorp_secret_name_path: "{{ _hashicorp_secret_name_path }}"
  when: 
  - vault.vault_authentication_type == 'certificate'

- set_fact:
    secret_value: "{{ hashicorp_vault_get_secret_result['data']['data'][_secret_field] | default('') | b64decode }}"

- include_tasks: write-secret-to-file.yml
  when: secret_file | default("") != ''
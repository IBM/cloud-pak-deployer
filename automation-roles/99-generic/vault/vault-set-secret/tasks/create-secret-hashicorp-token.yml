---
- name: Create secret Validate mandatory variables are defined
  assert:
    that:
      - hashicorp_vault_address is defined
      - hashicorp_secret_name_path is defined
      - hashicorp_secret_field is defined

- set_fact:
    _hashicorp_secret_value: "{{ {} | combine({hashicorp_secret_field: hashicorp_secret_payload}) }}" 

- name: Set value for secret {{ hashicorp_secret_name_path }}
  community.hashi_vault.vault_kv2_write:
    url: "{{ hashicorp_vault_address }}"
    path: "{{ hashicorp_secret_name_path }}"
    auth_method: token
    token: '{{ VAULT_PASSWORD }}'
    data: "{{ _hashicorp_secret_value}}"
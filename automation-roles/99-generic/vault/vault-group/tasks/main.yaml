---

- name: Validate mandatory variables are defined
  assert:
    that:
      - vault.vault_type is defined
      - vault.vault_authentication_type is defined
      - secret_group is defined

- name: Get or create Group IBMCloud
  include_tasks: group-ibmcloud.yml
  vars:
    ibmcloud_vault_address: "{{ vault.vault_url }}"
    ibmcloud_api_key: "{{ vault.vault_api_key }}"
    ibmcloud_secret_group_name: "{{ secret_group }}"
  when: "vault.vault_type == 'ibmcloud-vault'" 

---
- name: Check if cpd-cli tar.gz already exists
  stat:
    path: "{{ status_dir }}/downloads/cpd-cli-linux-{{ _cpd_cli_arch }}.tar.gz"
  register: _cpd_cli_tar_exists

- name: Get current version number of cpd-cli
  uri:
    url: "{{ _v_cpd_cli_releases }}"
    return_content: yes
    method: GET
    status_code: 200
  register: _cpd_cli_releases
  when: not _cpd_cli_tar_exists.stat.exists

- set_fact:
    _cpd_cli_download_url: "{{ _cpd_cli_releases.json.assets | json_query(query) | first }}"
  vars:
    query: >-
      [?starts_with(name,'cpd-cli-linux-') && ends_with(name,'.tar.gz')].browser_download_url
  when:
    - _cpd_cli_arch == "amd64"
    - not _cpd_cli_tar_exists.stat.exists

- set_fact:
    _cpd_cli_download_url: "{{ _cpd_cli_releases.json.assets | json_query(query) | first }}"
  vars:
    query: >-
      [?starts_with(name,'cpd-cli-{{ _cpd_cli_arch }}-') && ends_with(name,'.tar.gz')].browser_download_url
  when:
    - _cpd_cli_arch != "amd64"
    - not _cpd_cli_tar_exists.stat.exists

- name: Download latest cpd-cli release
  get_url:
    url: "{{ _cpd_cli_download_url }}"
    dest: "{{ status_dir }}/downloads/cpd-cli-linux-{{ _cpd_cli_arch }}.tar.gz"
    owner: root
    mode: 0644
    force: True
  register: _download_result
  until: _download_result is succeeded
  retries: 5
  delay: 30
  when: not _cpd_cli_tar_exists.stat.exists

- name: Skip download if cpd-cli already exists
  debug:
    msg: "cpd-cli tar.gz already exists, skipping download"
  when: _cpd_cli_tar_exists.stat.exists
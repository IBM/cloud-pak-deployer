- name: Get ICA CRD
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: casclusters.cas.ibm.com
  register: ica_crd
  retries: 10
  delay: 1

- name: Delete ICA instance
  kubernetes.core.k8s:
    state: absent
    api_version: cas.ibm.com/v1
    kind: CASCluster
    name: casdeploy
    namespace: "{{ ica_project_name }}"
    wait: true
    wait_sleep: 15
    wait_timeout: 120
  when: ica_crd.resources | length != 0

- name: Delete Secrets
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Secret
    name: "{{ item }}"
    namespace: "{{ ica_project_name }}"
    wait: true
    wait_sleep: 15
    wait_timeout: 120
  with_items:
    - ibm-content-assistant-secret
    - vector-database-secret
    - ibm-content-assistant-admin-key-secret

- name: Remove Operators
  ansible.builtin.include_role:
    name: common
    tasks_from: remove-operator
  vars:
    common_namespace_name: "{{ ica_project_name }}"
    common_label_selector_stub: "{{ item }}"
  with_items:
    - ibm-content-assistant-operator

- name: Remove Catalog Sources
  kubernetes.core.k8s:
    state: absent
    api_version: v1alpha1
    kind: CatalogSource
    name: "{{ item }}"
    namespace: openshift-marketplace
    wait: true
  with_items:
    - ibm-content-assistant-operator-catalog
